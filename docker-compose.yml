services:
  traefik:
    image: traefik:3.4.4
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      - TZ=Europe/Paris
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - CF_EMAIL=${MY_EMAIL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.toml:/etc/traefik/traefik.toml:ro
      - ./traefik/rules.toml:/etc/traefik/rules.toml:ro
      - ./traefik/acme.json:/etc/traefik/acme.json:rw
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.rule=Host(`traefik.feignman.online`)
      - traefik.http.routers.traefik.tls.certresolver=dns-cloudflare
      - traefik.http.routers.traefik.middlewares=authelia@docker

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    volumes:
      - ./authelia/config:/config
      - ./authelia/logs:/var/log/authelia
      - ./authelia/secrets:/secrets:ro
    expose:
      - 9091
    environment:
      TZ: Europe/Paris
      X_AUTHELIA_CONFIG_FILTERS: 'template'
      LLDAP_AUTHELIA_PASSWORD: ${AUTHELIA_LLDAP_PASSWORD}
      SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      JWT_SECRET: ${AUTHELIA_JWT_SECRET}
      STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      SMTP_EMAIL: ${MY_EMAIL}
      SMTP_PASSWORD: ${AUTHELIA_SMTP_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.feignman.online`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls.certresolver=dns-cloudflare"
      - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.feignman.online"
      - "traefik.http.middlewares.authelia.forwardauth.trustforwardheader=true"
      - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"

  lldap:
    image: lldap/lldap:stable
    container_name: lldap
    restart: unless-stopped
    environment:
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET}
      - LLDAP_KEY_SEED=${LLDAP_KEY_SEED}
      - LLDAP_LDAP_BASE_DN=dc=feignman,dc=online
      - LLDAP_LDAP_USER_DN=admin
      - LLDAP_LDAP_USER_EMAIL=${MY_EMAIL}
      - LLDAP_LDAP_USER_PASS=${LLDAP_USER_PASSWORD}
      # - LLDAP_SMTP_OPTIONS__PASSWORD=${LLDAP_SMTP_PASSWORD}
    ports:
      - "17170:17170"
      - "3890:3890"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lldap.rule=Host(`ldap.feignman.online`)"
      - "traefik.http.routers.lldap.entrypoints=websecure"
      - "traefik.http.routers.lldap.tls.certresolver=dns-cloudflare"
      - "traefik.http.services.lldap.loadbalancer.server.port=17170"

  vaultwarden:
    image: vaultwarden/server:1.36.0-alpine
    container_name: vaultwarden
    volumes:
      - ./volumes/vaultwarden:/data/
    ports:
      - 8090:80
    environment:
      - ADMIN_TOKEN=${VAULT_ADMIN_TOKEN}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.feignman.online`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=dns-cloudflare"

  nzbget:
    image: ghcr.io/linuxserver/nzbget:version-v25.2
    container_name: nzbget
    environment:
      - PUID=3002
      - PGID=3002
      - TZ=Europe/Paris
      - UMASK_SET=022 #optional
    volumes:
      - ./volumes/nzbget/config:/config
      - /truenas/downloads:/downloads
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.nzbget.rule=Host(`nzbget.feignman.online`)"
      - "traefik.http.routers.nzbget.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=dns-cloudflare"
      # - "traefik.http.routers.nzbget.middlewares=auth@file"
    ports:
      - 6789:6789
    restart: unless-stopped

  deluge:
    image: linuxserver/deluge:2.1.1
    container_name: deluge
    network_mode: host
    environment:
      - PUID=3002
      - PGID=3002
      - TZ=Europe/Paris
      #- UMASK_SET=022 #optional
      #- DELUGE_LOGLEVEL=error #optional
    volumes:
      - ./volumes/deluge/config:/config
      - /truenas/downloads:/downloads
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.nzbget.rule=Host(`deluge.feignman.online`)"
      - "traefik.http.routers.nzbget.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=dns-cloudflare"
    restart: unless-stopped

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=3002
      - PGID=993  # needs to be set to the GID of 'render' to allow GPU access
      - VERSION=docker
      - SYSCALL_MAX_ENABLED=1
      - TZ=Europe/Paris
      # - UMASK_SET=022 #optional
    volumes:
      - ./volumes/plex/config:/config
      - ./volumes/plex/transcode:/transcode
      - /truenas/Movies:/data/Movies
      - /truenas/Series:/data/Series
      - /truenas/downloads/downloaded/extra:/data/Extras
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=3002
      - PGID=3002
      - TZ=Europe/Paris
      # - UMASK_SET=022 #optional
    volumes:
      - ./volumes/radarr/config:/config
      - /truenas/Movies:/movies
      - /truenas/downloads:/downloads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.feignman.online`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.middlewares=authelia@docker"
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=3002
      - PGID=3002
      - TZ=Europe/Paris
      - UMASK_SET=022 #optional
    volumes:
      - ./volumes/sonarr/config:/config
      - /truenas/Series:/series
      - /truenas/downloads:/downloads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.feignman.online`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.middlewares=authelia@docker"
    ports:
      - 8989:8989
    restart: unless-stopped

  telegraf:
     container_name: telegraf
     image: telegraf:1.35
     restart: unless-stopped
     # Added for latest telegraf: https://www.influxdata.com/blog/docker-run-telegraf-as-non-root/
     user: telegraf:995
     privileged: true
     environment:
       HOST_MOUNT_PREFIX: /rootfs
       HOST_RUN: /rootfs/run
       HOST_VAR: /rootfs/var
       HOST_PROC: /rootfs/proc
       HOST_SYS: /rootfs/sys
       HOST_ETC: /rootfs/etc
     volumes:
       - ./telegraf/docker-lxc-host.conf:/etc/telegraf/telegraf.conf:ro
       - /var/run/docker.sock:/var/run/docker.sock:ro
       - /:/rootfs:ro

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - ./volumes/homarr:/appdata
    environment:
      - SECRET_ENCRYPTION_KEY=${HOMARR_ENCRYPTION_KEY}
    #  - PUID=1000
    #  - PGID=1000
    ports:
      - '7575:7575'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`home.feignman.online`)"
      - "traefik.http.routers.homarr.entrypoints=websecure"
      - "traefik.http.routers.homarr.tls.certresolver=dns-cloudflare"

### -------------------------------------------------------------------
###                               KARAKEEP
### -------------------------------------------------------------------

  karakeep-web:
    container_name: karakeep-web
    image: ghcr.io/karakeep-app/karakeep:release
    restart: unless-stopped
    volumes:
      - ./volumes/karakeep/data:/data
    ports:
      - 2000:3000
    user: ${UID:-1000}:${GID:-1000}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.karakeep.rule=Host(`karakeep.feignman.online`)"
      - "traefik.http.routers.karakeep.entrypoints=websecure"
      - "traefik.http.routers.karakeep.tls.certresolver=dns-cloudflare"
    environment:
      MEILI_ADDR: http://karakeep-meilisearch:7700
      BROWSER_WEB_URL: http://karakeep-chrome:9222
      DATA_DIR: /data
      LOG_LEVEL: info
      NEXTAUTH_URL: https://karakeep.feignman.online
      NEXTAUTH_SECRET: ${KARAKEEP_NEXTAUTH_SECRET}
      MEILI_MASTER_KEY: ${KARAKEEP_MEILISEARCH_MASTERKEY}
      OPENAI_API_KEY: ${KARAKEEP_GEMINI_API_KEY}
      OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta
      INFERENCE_TEXT_MODEL: gemini-2.5-flash
      INFERENCE_IMAGE_MODEL: gemini-2.5-flash

  karakeep-chrome:
    container_name: karakeep-chrome
    image: gcr.io/zenika-hub/alpine-chrome:123
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars

  karakeep-meilisearch:
    container_name: karakeep-meilisearch
    image: getmeili/meilisearch:v1.13.3
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${KARAKEEP_MEILISEARCH_MASTERKEY}
    volumes:
      - ./volumes/karakeep/meilisearch:/meili_data

### -------------------------------------------------------------------
###                               IMMICH
### -------------------------------------------------------------------

  immich-postgres:
    container_name: immich-postgres

    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ./volumes/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always

  immich-redis:
    container_name: immich-redis
    image: docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  immich-machine-learning:
    container_name: immich-machine-learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] >
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    environment:
      - MACHINE_LEARNING_REQUEST_THREADS=6
      - MACHINE_LEARNING_MODEL_TTL=600
    restart: always
    healthcheck:
      disable: false

  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:v2
    volumes:
      - /truenas/Photos:/mnt/media/external-library
      - /truenas/immich-library:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Paris
      - DB_HOSTNAME=immich-postgres
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=postgres
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - IMMICH_TRUSTED_PROXIES=172.18.0.0/16
    ports:
      - '2283:2283'
    devices:
      - /dev/dri:/dev/dri
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.rule=Host(`immich.feignman.online`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls.certresolver=dns-cloudflare"
    depends_on:
      - immich-redis
      - immich-postgres
    restart: always
    healthcheck:
      disable: false

volumes:
  model-cache:

networks:
  docker-stack-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
